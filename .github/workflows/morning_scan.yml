name: Morning Scan

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 9 AM ET (UTC-4 summer) weekdays — SEC filings start arriving
  workflow_dispatch:           # Also runnable manually from GitHub Actions tab

permissions:
  contents: read               # Read-only — no commits needed for morning scan

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning scan
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
          SMS_EMAIL:          ${{ secrets.SMS_EMAIL }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        run: python src/morning_scan.py
